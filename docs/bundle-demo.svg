<svg width="980" height="560" viewBox="0 0 980 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="980" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F3ED"/>
      <stop offset="1" stop-color="#EDF3F6"/>
    </linearGradient>
    <filter id="shadow2" x="42" y="92" width="896" height="392" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#31404D" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="980" height="560" fill="url(#bg2)"/>
  <text x="56" y="64" fill="#22313F" font-family="Georgia, serif" font-size="36" font-weight="700">Markdown-first article bundle</text>
  <text x="56" y="98" fill="#556575" font-family="Arial, sans-serif" font-size="18">The `.md` file is the canonical artifact. Everything else is derived around it.</text>

  <g filter="url(#shadow2)">
    <rect x="64" y="124" width="852" height="328" rx="24" fill="#FFFFFF"/>
  </g>

  <rect x="96" y="160" width="340" height="258" rx="18" fill="#FCFBF8" stroke="#E7DED3"/>
  <text x="120" y="196" fill="#1D2A36" font-family="Arial, sans-serif" font-size="20" font-weight="700">/output/agents/Article Title/</text>

  <text x="122" y="236" fill="#5D6B79" font-family="Consolas, monospace" font-size="15">Article Title.md</text>
  <text x="122" y="267" fill="#5D6B79" font-family="Consolas, monospace" font-size="15">Article Title.notes.md</text>
  <text x="122" y="298" fill="#5D6B79" font-family="Consolas, monospace" font-size="15">Article Title.bib</text>
  <text x="122" y="329" fill="#5D6B79" font-family="Consolas, monospace" font-size="15">Article Title.reading.pdf</text>
  <text x="122" y="360" fill="#5D6B79" font-family="Consolas, monospace" font-size="15">Article Title.source.pdf</text>
  <text x="122" y="391" fill="#5D6B79" font-family="Consolas, monospace" font-size="15">assets/</text>

  <rect x="488" y="160" width="396" height="258" rx="18" fill="#F8FAFC" stroke="#D7E0E8"/>
  <text x="516" y="196" fill="#1D2A36" font-family="Arial, sans-serif" font-size="20" font-weight="700">What each artifact is for</text>

  <rect x="516" y="220" width="334" height="44" rx="10" fill="#EEF6EC"/>
  <text x="532" y="247" fill="#245332" font-family="Arial, sans-serif" font-size="15" font-weight="700">`.md`</text>
  <text x="592" y="247" fill="#3E5567" font-family="Arial, sans-serif" font-size="14">Canonical text for LLMs, search, indexing</text>

  <rect x="516" y="276" width="334" height="44" rx="10" fill="#F8F0E6"/>
  <text x="532" y="303" fill="#8A5B17" font-family="Arial, sans-serif" font-size="15" font-weight="700">`.notes.md`</text>
  <text x="632" y="303" fill="#3E5567" font-family="Arial, sans-serif" font-size="14">Companion summary and takeaways</text>

  <rect x="516" y="332" width="334" height="44" rx="10" fill="#EEF2FB"/>
  <text x="532" y="359" fill="#305495" font-family="Arial, sans-serif" font-size="15" font-weight="700">`.bib`</text>
  <text x="592" y="359" fill="#3E5567" font-family="Arial, sans-serif" font-size="14">Citation metadata and export-friendly bibliography</text>

  <rect x="516" y="388" width="334" height="44" rx="10" fill="#F4F4F4"/>
  <text x="532" y="415" fill="#495057" font-family="Arial, sans-serif" font-size="15" font-weight="700">PDFs</text>
  <text x="592" y="415" fill="#3E5567" font-family="Arial, sans-serif" font-size="14">Readable derivative + original source for provenance</text>
</svg>
