<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="assets/css/popup.css">
</head>
<body>
  <div class="container">
    <h3>Corpus Scribe</h3>
    <div class="row row-stack">
      <label for="label-name">Label</label>
      <input id="label-name" type="text" list="label-options" placeholder="Choose or create a label" autocomplete="off">
      <datalist id="label-options"></datalist>
    </div>
    <div class="row">
      <label for="page-size">Page size</label>
      <select id="page-size">
        <option value="a5" selected>A5</option>
        <option value="a4">A4</option>
      </select>
    </div>
    <div id="doc-hint" class="hint"></div>
    <button id="btn-open-scribe" class="btn btn-primary">Open in Corpus Scribe</button>
    <button id="btn-save" class="btn btn-secondary">Save PDF + MD</button>
    <div id="status" class="status"></div>

    <details id="settings-toggle">
      <summary>Settings</summary>
      <div class="settings">
        <label for="cfg-api-base">API URL</label>
        <input id="cfg-api-base" type="text" placeholder="http://127.0.0.1:5000">
        <label for="cfg-api-key">API key</label>
        <input id="cfg-api-key" type="text" placeholder="api-key-1234">
        <label for="cfg-reader-url">Corpus Scribe URL</label>
        <input id="cfg-reader-url" type="text" placeholder="http://127.0.0.1:1420">
      </div>
    </details>
  </div>
  <script src="popup.js"></script>
</body>
</html>
