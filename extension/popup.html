<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="assets/css/popup.css">
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h3>Corpus Scribe</h3>
      <span id="connection-dot" class="dot dot-pending" title="Checking backend..."></span>
    </div>

    <div id="page-info" class="page-info"></div>

    <div class="field">
      <label for="label-select">Label</label>
      <div class="label-input-group">
        <select id="label-select">
          <option value="" disabled>Loading labels...</option>
        </select>
        <input id="label-new" type="text" placeholder="New label name..." class="hidden">
        <button id="label-new-cancel" type="button" class="label-cancel hidden" title="Cancel">&times;</button>
      </div>
    </div>

    <div class="actions">
      <button id="btn-save" class="btn btn-secondary">Save</button>
      <button id="btn-open-scribe" class="btn btn-primary">Save &amp; Open</button>
    </div>
    <div id="status" class="status"></div>

    <details id="settings-toggle">
      <summary>Settings</summary>
      <div class="settings">
        <label for="cfg-api-base">API URL</label>
        <input id="cfg-api-base" type="text" placeholder="http://127.0.0.1:5000">
        <label for="cfg-api-key">API key</label>
        <input id="cfg-api-key" type="text" placeholder="api-key-1234">
        <label for="cfg-reader-url">Corpus Scribe URL</label>
        <input id="cfg-reader-url" type="text" placeholder="http://127.0.0.1:1420">
      </div>
    </details>
  </div>
  <script src="popup.js"></script>
</body>
</html>
