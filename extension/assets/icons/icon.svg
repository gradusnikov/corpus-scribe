<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a73e8"/>
  <!-- Book/page shape -->
  <rect x="32" y="24" width="52" height="72" rx="4" fill="#fff" opacity="0.95"/>
  <!-- Page lines -->
  <line x1="40" y1="40" x2="72" y2="40" stroke="#b0c4de" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="50" x2="72" y2="50" stroke="#b0c4de" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="60" x2="65" y2="60" stroke="#b0c4de" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="70" x2="68" y2="70" stroke="#b0c4de" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="80" x2="58" y2="80" stroke="#b0c4de" stroke-width="2" stroke-linecap="round"/>
  <!-- Pen/quill -->
  <g transform="translate(62, 48) rotate(35)">
    <!-- Pen body -->
    <rect x="-3" y="-40" width="6" height="50" rx="2" fill="#f4a623"/>
    <!-- Pen tip -->
    <polygon points="0,14 -4,10 4,10" fill="#333"/>
    <!-- Pen cap -->
    <rect x="-4" y="-44" width="8" height="8" rx="2" fill="#d4891c"/>
  </g>
</svg>
